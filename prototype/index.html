<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta -->
    <meta name="theme-color" content="#0a1628" />
    <meta name="background-color" content="#0a1628" />
    <meta name="color-scheme" content="dark" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="高榮術後追蹤" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- SEO -->
    <title>高雄榮總 術後追蹤系統</title>
    <meta name="description" content="高雄榮民總醫院 大腸直腸外科 — 痔瘡手術術後症狀回報、AI 衛教與智慧追蹤系統" />
  </head>
  <body>
    <script>
      // Apply saved theme before React hydrates to prevent flash
      const t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
