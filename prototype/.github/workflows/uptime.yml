name: Uptime Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Call health endpoint
        id: health
        run: |
          HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
            --max-time 30 \
            "https://krohucxzthnukbuzfwiu.supabase.co/functions/v1/health" || echo "000")
          BODY=$(cat /tmp/health_response.json 2>/dev/null || echo "{}")
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "❌ Health check FAILED (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            echo "status=unhealthy" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Issue on failure
        if: steps.health.outputs.status == 'unhealthy'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Health check failed (HTTP ${process.env.HTTP_CODE})`;
            const body = `## Uptime Alert\n\n- **Time**: ${new Date().toISOString()}\n- **HTTP Code**: ${process.env.HTTP_CODE}\n- **Response**: \`${process.env.BODY}\`\n\nPlease investigate immediately.`;

            // Check if there's already an open issue with this label
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'alert:uptime',
              state: 'open',
            });

            if (existingIssues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['alert:uptime'],
              });
              console.log('Created new issue');
            } else {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues[0].number,
                body: `### Still failing\n\n- **Time**: ${new Date().toISOString()}\n- **HTTP Code**: ${process.env.HTTP_CODE}`,
              });
              console.log('Added comment to existing issue #' + existingIssues[0].number);
            }
        env:
          HTTP_CODE: ${{ steps.health.outputs.http_code }}
          BODY: ${{ steps.health.outputs.body }}

      - name: Auto-close issue on recovery
        if: steps.health.outputs.status == 'healthy'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'alert:uptime',
              state: 'open',
            });
            for (const issue of openIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Recovered** at ${new Date().toISOString()}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
