name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────
  # Job 1: Lint + Unit Tests + Coverage
  # ─────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npx vitest run --coverage --reporter=default --reporter=json --outputFile=test-results.json

      - name: Check coverage threshold (90%)
        run: |
          npx vitest run --coverage --coverage.thresholds.statements=90 --coverage.thresholds.lines=90 --coverage.thresholds.functions=85

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─────────────────────────────────────
  # Job 2: Build
  # ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────
  # Job 3: Edge Function Smoke Tests
  # ─────────────────────────────────────
  edge-functions:
    name: Edge Function Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy ai-chat --no-verify-jwt
          supabase functions deploy patient-onboard --no-verify-jwt
          supabase functions deploy check-adherence --no-verify-jwt
          supabase functions deploy health --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run DB Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Smoke test — health endpoint
        run: |
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 15 \
            "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/health")
          cat /tmp/health.json
          echo ""
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: health returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "OK: health endpoint returned 200"

      - name: Smoke test — ai-chat rejects without auth
        run: |
          HTTP_CODE=$(curl -s -o /tmp/aichat.json -w "%{http_code}" \
            --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -d '{"question":"test"}' \
            "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/ai-chat")
          cat /tmp/aichat.json
          echo ""
          if [ "$HTTP_CODE" != "401" ]; then
            echo "FAIL: ai-chat should return 401 without auth, got $HTTP_CODE"
            exit 1
          fi
          echo "OK: ai-chat correctly rejects unauthenticated requests"

      - name: Smoke test — patient-onboard rejects without auth
        run: |
          HTTP_CODE=$(curl -s -o /tmp/onboard.json -w "%{http_code}" \
            --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -d '{}' \
            "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/patient-onboard")
          cat /tmp/onboard.json
          echo ""
          if [ "$HTTP_CODE" != "401" ]; then
            echo "FAIL: patient-onboard should return 401, got $HTTP_CODE"
            exit 1
          fi
          echo "OK: patient-onboard correctly rejects unauthenticated requests"

      - name: Smoke test — check-adherence rejects without cron secret
        run: |
          HTTP_CODE=$(curl -s -o /tmp/adherence.json -w "%{http_code}" \
            --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/check-adherence")
          cat /tmp/adherence.json
          echo ""
          if [ "$HTTP_CODE" != "401" ]; then
            echo "FAIL: check-adherence should return 401, got $HTTP_CODE"
            exit 1
          fi
          echo "OK: check-adherence correctly rejects unauthorized requests"

      - name: Smoke test — ai-chat CORS headers
        run: |
          curl -s -D /tmp/cors_headers.txt -o /dev/null \
            -X OPTIONS \
            -H "Origin: https://prototype-zeta-black.vercel.app" \
            -H "Access-Control-Request-Method: POST" \
            "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/ai-chat"
          cat /tmp/cors_headers.txt
          if grep -qi "access-control-allow-origin" /tmp/cors_headers.txt; then
            echo "OK: CORS headers present"
          else
            echo "FAIL: No CORS headers in response"
            exit 1
          fi

  # ─────────────────────────────────────
  # Job 4: E2E Tests (Demo Mode)
  # ─────────────────────────────────────
  e2e-demo:
    name: E2E Tests (Demo Mode)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run E2E tests (demo mode)
        run: |
          CI=true npx playwright test e2e/login-flow.spec.ts e2e/patient-full-journey.spec.ts e2e/researcher-full-journey.spec.ts e2e/demo-flow.spec.ts
        env:
          CI: true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-demo-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  # ─────────────────────────────────────
  # Job 5: E2E Tests (Auth Mode — Supabase)
  # ─────────────────────────────────────
  e2e-auth:
    name: E2E Tests (Auth Mode)
    runs-on: ubuntu-latest
    needs: [build, edge-functions]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run E2E tests (auth mode)
        run: |
          CI=true npx playwright test e2e/auth-flow.spec.ts e2e/researcher-flow.spec.ts e2e/patient-registration.spec.ts
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_RESEARCHER_EMAIL: ${{ secrets.E2E_RESEARCHER_EMAIL }}
          E2E_RESEARCHER_PASSWORD: ${{ secrets.E2E_RESEARCHER_PASSWORD }}
          E2E_INVITE_CODE: ${{ secrets.E2E_INVITE_CODE }}

      - name: Upload E2E auth results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-auth-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14
