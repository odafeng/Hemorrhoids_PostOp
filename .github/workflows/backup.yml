name: Weekly Database Backup

on:
  schedule:
    # Every Sunday 03:00 UTC (11:00 Taiwan time)
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        run: |
          if [ -z "$DB_URI" ]; then
            echo "::error::SUPABASE_DB_URI secret is not set"
            exit 1
          fi
          # Force IPv4 — GitHub Actions runners prefer IPv6 but Supabase blocks it
          echo 'precedence ::ffff:0:0/96 100' | sudo tee /etc/gai.conf > /dev/null
          pg_dump \
            "$DB_URI" \
            --schema=public \
            --no-owner \
            --no-privileges \
            -F c \
            -f "backup_$(date +%Y%m%d).dump"
        env:
          DB_URI: ${{ secrets.SUPABASE_DB_URI }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.dump
          retention-days: 90
