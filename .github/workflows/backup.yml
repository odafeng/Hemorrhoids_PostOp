name: Weekly Database Backup

on:
  schedule:
    # Every Sunday 03:00 UTC (11:00 Taiwan time)
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run pg_dump
        run: |
          if [ -z "$DB_URI" ]; then
            echo "::error::SUPABASE_DB_URI secret is not set"
            exit 1
          fi
          # Extract hostname from URI and resolve to IPv4
          DB_HOST=$(echo "$DB_URI" | sed -E 's|.*@([^:]+):.*|\1|')
          DB_IPV4=$(getent ahostsv4 "$DB_HOST" | head -1 | awk '{print $1}')
          if [ -z "$DB_IPV4" ]; then
            echo "::error::Could not resolve $DB_HOST to IPv4"
            exit 1
          fi
          echo "Resolved $DB_HOST → $DB_IPV4"
          # Replace hostname with IPv4 in URI
          DB_URI_V4=$(echo "$DB_URI" | sed "s|$DB_HOST|$DB_IPV4|")
          /usr/lib/postgresql/17/bin/pg_dump \
            "$DB_URI_V4" \
            --schema=public \
            --no-owner \
            --no-privileges \
            -F c \
            -f "backup_$(date +%Y%m%d).dump"
        env:
          DB_URI: ${{ secrets.SUPABASE_DB_URI }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.dump
          retention-days: 90
